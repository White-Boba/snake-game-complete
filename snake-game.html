<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 600px;
    }
    canvas {
      display: block;
      background-color: #000;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
    }
    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 2em;
      display: none;
    }
    #restart-button {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      background-color: #f00;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="score">Score: 0</div>
    <div id="game-over">Game Over!</div>
    <button id="restart-button" onclick="restartGame()">Restart Game</button>
  </div>
  <script>
    // JavaScript code for the Snake game will go here
  </script>
</body>
</html>
