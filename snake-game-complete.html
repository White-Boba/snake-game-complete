<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    .score-board {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 15px;
      color: #fff;
      font-size: 1.2em;
    }
    canvas {
      border: 3px solid #fff;
      border-radius: 10px;
      background: #111;
      display: block;
      margin: 0 auto;
    }
    .controls {
      margin-top: 15px;
      color: #fff;
      font-size: 0.9em;
      opacity: 0.8;
    }
    #restartBtn {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 1.1em;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      display: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #restartBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border-radius: 15px;
      color: #fff;
      display: none;
      text-align: center;
    }
    .game-over h2 {
      color: #ff6b6b;
      margin-bottom: 20px;
      font-size: 2.5em;
    }
    .game-over p {
      font-size: 1.3em;
      margin: 10px 0;
    }
    .canvas-container {
      position: relative;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🐍 Snake Game</h1>
    <div class="score-board">
      <div>Score: <span id="score">0</span></div>
      <div>High Score: <span id="highScore">0</span></div>
    </div>
    <div class="canvas-container">
      <canvas id="gameCanvas" width="500" height="500"></canvas>
      <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>
    <div class="controls">
      Use Arrow Keys to move
    </div>
  </div>

  <script>
    // Game configuration
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 25;
    const tileCount = 20;
    
    // Game state
    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 1; // Start moving right
    let dy = 0;
    let nextDx = 1; // Buffer for next direction
    let nextDy = 0;
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameRunning = true;
    let gameSpeed = 150; // Slower start for playability
    
    // Update high score display
    document.getElementById('highScore').textContent = highScore;
    
    // Input handling - use keydown with preventDefault to stop scrolling
    document.addEventListener('keydown', handleInput, { passive: false });
    document.getElementById('restartBtn').addEventListener('click', restartGame);
    
    function handleInput(e) {
      if (!gameRunning) return;
      
      const key = e.key;
      
      // Prevent reversing direction and prevent page scrolling
      if (key === 'ArrowUp' && dy !== 1) { nextDx = 0; nextDy = -1; e.preventDefault(); }
      else if (key === 'ArrowDown' && dy !== -1) { nextDx = 0; nextDy = 1; e.preventDefault(); }
      else if (key === 'ArrowLeft' && dx !== 1) { nextDx = -1; nextDy = 0; e.preventDefault(); }
      else if (key === 'ArrowRight' && dx !== -1) { nextDx = 1; nextDy = 0; e.preventDefault(); }
    }
    
    function update() {
      if (!gameRunning) return;
      
      // Apply buffered direction
      dx = nextDx;
      dy = nextDy;
      
      // Move snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      // Check wall collision (wrap around instead of die)
      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;
      
      // Check self collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }
      
      snake.unshift(head);
      
      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        
        // Update high score
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
          document.getElementById('highScore').textContent = highScore;
        }
        
        // Increase speed slightly (down to 50ms)
        gameSpeed = Math.max(50, gameSpeed - 3);
        
        // Spawn new food
        spawnFood();
      } else {
        snake.pop();
      }
      
      draw();
    }
    
    function spawnFood() {
      do {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }
    
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid (optional, subtle)
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
      
      // Draw snake
      snake.forEach((segment, index) => {
        // Head is different color
        if (index === 0) {
          ctx.fillStyle = '#4CAF50';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#4CAF50';
        } else {
          ctx.fillStyle = '#81C784';
          ctx.shadowBlur = 0;
        }
        ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
      });
      ctx.shadowBlur = 0;
      
      // Draw food
      ctx.fillStyle = '#FF5252';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#FF5252';
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    function gameOver() {
      gameRunning = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').style.display = 'block';
      document.getElementById('restartBtn').style.display = 'inline-block';
    }
    
    function restartGame() {
      snake = [{x: 10, y: 10}];
      food = {x: 5, y: 5};
      dx = 1; // Start moving right
      dy = 0;
      nextDx = 1;
      nextDy = 0;
      score = 0;
      gameSpeed = 150; // Reset speed
      gameRunning = true;
      
      document.getElementById('score').textContent = '0';
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('restartBtn').style.display = 'none';
      
      spawnFood();
      setInterval(update, gameSpeed);
    }
    
    // Start game on load
    spawnFood();
    setInterval(update, gameSpeed);
  </script>
</body>
</html>
