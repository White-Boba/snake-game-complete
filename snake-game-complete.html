<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .game-wrapper {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    .score-board {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 15px;
      color: #fff;
      font-size: 1.2em;
    }
    canvas {
      border: 3px solid #fff;
      border-radius: 10px;
      background: #111;
      display: block;
      margin: 0 auto;
      touch-action: none;
    }
    .controls {
      margin-top: 15px;
      color: #fff;
      font-size: 0.9em;
      opacity: 0.8;
    }
    #restartBtn {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 1.1em;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      display: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #restartBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border-radius: 15px;
      color: #fff;
      display: none;
      text-align: center;
    }
    .game-over h2 {
      color: #ff6b6b;
      margin-bottom: 20px;
      font-size: 2.5em;
    }
    .game-over p {
      font-size: 1.3em;
      margin: 10px 0;
    }
    .canvas-container {
      position: relative;
      display: inline-block;
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 10px;
      cursor: pointer;
    }
    #startScreen .title {
      font-size: 4em;
      margin-bottom: 20px;
      color: #4CAF50;
      text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
    }
    #startScreen .subtitle {
      font-size: 1.3em;
      color: #fff;
      opacity: 0.9;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(2, 60px);
      gap: 5px;
      justify-content: center;
      margin-top: 15px;
    }
    .dpad button {
      width: 60px;
      height: 60px;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dpad button:active {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0.95);
    }
    .dpad .up { grid-column: 2; grid-row: 1; }
    .dpad .left { grid-column: 1; grid-row: 2; }
    .dpad .down { grid-column: 2; grid-row: 2; }
    .dpad .right { grid-column: 3; grid-row: 2; }
    @media (min-width: 600px) {
      .dpad { display: none; }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>🐍 Snake Game</h1>
    <div class="score-board">
      <div>Score: <span id="score">0</span></div>
      <div>High Score: <span id="highScore">0</span></div>
    </div>
    <div class="canvas-container">
      <canvas id="gameCanvas" width="500" height="500"></canvas>
      <div id="startScreen">
        <div class="title">🐍 SNAKE</div>
        <div class="subtitle">Press SPACE or Click to Start</div>
      </div>
      <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>
    <div class="dpad">
      <button class="up">↑</button>
      <button class="left">←</button>
      <button class="down">↓</button>
      <button class="right">→</button>
    </div>
    <div class="controls">
      Use Arrow Keys to move
    </div>
  </div>

  <script>
    // Game configuration
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 25;
    const tileCount = 20;
    
    // Game state
    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 1; // Start moving right
    let dy = 0;
    let nextDx = 1; // Buffer for next direction
    let nextDy = 0;
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameRunning = true;
    let gameSpeed = 150; // Slower start for playability
    let gameInterval = null;
    let gameStarted = false;
    let isPaused = false;
    
    // Score animation array
    let scoreAnims = [];
    
    // Update high score display
    document.getElementById('highScore').textContent = highScore;
    
    // Input handling - use keydown with preventDefault to stop scrolling
    document.addEventListener('keydown', handleInput, { passive: false });
    document.getElementById('restartBtn').addEventListener('click', restartGame);
    document.getElementById('startScreen').addEventListener('click', startGame);
    canvas.addEventListener('click', function() {
      if (!gameStarted) {
        startGame();
      }
    });
    
    // D-pad button handlers
    document.querySelector('.dpad .up').addEventListener('click', () => setDirection(0, -1));
    document.querySelector('.dpad .down').addEventListener('click', () => setDirection(0, 1));
    document.querySelector('.dpad .left').addEventListener('click', () => setDirection(-1, 0));
    document.querySelector('.dpad .right').addEventListener('click', () => setDirection(1, 0));
    
    // Touch swipe handlers
    let touchStartX = 0;
    let touchStartY = 0;
    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
    
    function handleTouchStart(e) {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
    
    function handleTouchEnd(e) {
      e.preventDefault();
      if (!touchStartX || !touchStartY) return;
      
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;
      
      if (Math.abs(deltaX) < 30 && Math.abs(deltaY) < 30) return; // Too small
      
      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        // Horizontal swipe
        setDirection(deltaX > 0 ? 1 : -1, 0);
      } else {
        // Vertical swipe
        setDirection(0, deltaY > 0 ? 1 : -1);
      }
      
      touchStartX = 0;
      touchStartY = 0;
    }
    
    function setDirection(newDx, newDy) {
      if (!gameRunning || !gameStarted || isPaused) return;
      
      // Prevent reversing direction
      if (newDx !== 0 && nextDx === -newDx) return;
      if (newDy !== 0 && nextDy === -newDy) return;
      
      nextDx = newDx;
      nextDy = newDy;
    }
    
    function handleInput(e) {
      const key = e.key;
      
      // Space bar handling
      if (key === ' ') {
        e.preventDefault();
        if (!gameStarted) {
          startGame();
          return;
        }
        if (gameRunning) {
          togglePause();
        }
        return;
      }
      
      if (!gameRunning || !gameStarted || isPaused) return;
      
      // Prevent reversing direction and prevent page scrolling
      if (key === 'ArrowUp' && nextDy !== 1) { nextDx = 0; nextDy = -1; e.preventDefault(); }
      else if (key === 'ArrowDown' && nextDy !== -1) { nextDx = 0; nextDy = 1; e.preventDefault(); }
      else if (key === 'ArrowLeft' && nextDx !== 1) { nextDx = -1; nextDy = 0; e.preventDefault(); }
      else if (key === 'ArrowRight' && nextDx !== -1) { nextDx = 1; nextDy = 0; e.preventDefault(); }
    }
    
    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      document.getElementById('startScreen').style.display = 'none';
      // Clear any existing interval before starting
      clearInterval(gameInterval);
      gameInterval = setInterval(update, gameSpeed);
    }
    
    function togglePause() {
      isPaused = !isPaused;
      if (isPaused) {
        clearInterval(gameInterval);
        draw(); // Redraw to show paused text
      } else {
        gameInterval = setInterval(update, gameSpeed);
      }
    }
    
    function update() {
      if (!gameRunning || isPaused) return;
      
      // Apply buffered direction
      dx = nextDx;
      dy = nextDy;
      
      // Move snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      
      // Check wall collision (wrap around instead of die)
      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;
      
      // Check self collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }
      
      snake.unshift(head);
      
      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        
        // Add score animation at food position
        scoreAnims.push({
          x: food.x * gridSize + gridSize/2,
          y: food.y * gridSize,
          alpha: 1,
          offsetY: 0
        });
        
        // Update high score
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore);
          document.getElementById('highScore').textContent = highScore;
        }
        
        // Restart interval with new speed
        gameSpeed = Math.max(50, gameSpeed - 3);
        clearInterval(gameInterval);
        gameInterval = setInterval(update, gameSpeed);
        
        // Spawn new food
        spawnFood();
      } else {
        snake.pop();
      }
      
      draw();
    }
    
    function spawnFood() {
      do {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }
    
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid (optional, subtle)
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
      
      // Draw snake
      snake.forEach((segment, index) => {
        const x = segment.x * gridSize + 1;
        const y = segment.y * gridSize + 1;
        const size = gridSize - 2;
        
        ctx.beginPath();
        if (index === 0) {
          // Head: brighter green with glow
          ctx.fillStyle = '#4CAF50';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#4CAF50';
          ctx.roundRect(x, y, size, size, 8);
          ctx.fill();
          ctx.shadowBlur = 0;
          
          // Draw eyes on head
          drawSnakeEyes(segment.x, segment.y, size);
        } else {
          // Body: lighter green, no glow
          ctx.fillStyle = '#81C784';
          ctx.shadowBlur = 0;
          ctx.roundRect(x, y, size, size, 6);
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0;
      
      // Draw food with pulse animation
      ctx.fillStyle = '#FF5252';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#FF5252';
      
      const foodCenterX = food.x * gridSize + gridSize/2;
      const foodCenterY = food.y * gridSize + gridSize/2;
      const pulseScale = 1 + 0.15 * Math.sin(Date.now() / 200);
      
      ctx.save();
      ctx.translate(foodCenterX, foodCenterY);
      ctx.scale(pulseScale, pulseScale);
      ctx.beginPath();
      ctx.arc(0, 0, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
      
      // Draw score animations
      drawScoreAnims();
      
      // Draw paused text if paused
      if (isPaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 48px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⏸ PAUSED', canvas.width / 2, canvas.height / 2);
      }
    }
    
    function drawSnakeEyes(segX, segY, size) {
      const eyeRadius = 3;
      const pupilRadius = 1.5;
      const offset = size / 3;
      const centerX = segX * gridSize + gridSize / 2;
      const centerY = segY * gridSize + gridSize / 2;
      
      let leftEyeX, leftEyeY, rightEyeX, rightEyeY;
      
      // Position eyes based on direction
      if (dx === 1 && dy === 0) { // Right
        leftEyeX = centerX + offset; leftEyeY = centerY - offset;
        rightEyeX = centerX + offset; rightEyeY = centerY + offset;
      } else if (dx === -1 && dy === 0) { // Left
        leftEyeX = centerX - offset; leftEyeY = centerY + offset;
        rightEyeX = centerX - offset; rightEyeY = centerY - offset;
      } else if (dx === 0 && dy === -1) { // Up
        leftEyeX = centerX - offset; leftEyeY = centerY - offset;
        rightEyeX = centerX + offset; rightEyeY = centerY - offset;
      } else if (dx === 0 && dy === 1) { // Down
        leftEyeX = centerX - offset; leftEyeY = centerY + offset;
        rightEyeX = centerX + offset; rightEyeY = centerY + offset;
      } else { // Default (right)
        leftEyeX = centerX + offset; leftEyeY = centerY - offset;
        rightEyeX = centerX + offset; rightEyeY = centerY + offset;
      }
      
      // Left eye (white)
      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.arc(leftEyeX, leftEyeY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Left pupil (black)
      ctx.beginPath();
      ctx.fillStyle = '#000';
      ctx.arc(leftEyeX, leftEyeY, pupilRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Right eye (white)
      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.arc(rightEyeX, rightEyeY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Right pupil (black)
      ctx.beginPath();
      ctx.fillStyle = '#000';
      ctx.arc(rightEyeX, rightEyeY, pupilRadius, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawScoreAnims() {
      for (let i = scoreAnims.length - 1; i >= 0; i--) {
        const anim = scoreAnims[i];
        
        ctx.save();
        ctx.globalAlpha = anim.alpha;
        ctx.fillStyle = '#FF5252';
        ctx.font = 'bold 20px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('+10', anim.x, anim.y + anim.offsetY);
        ctx.restore();
        
        // Update animation
        anim.offsetY -= 1.5; // Rise up
        anim.alpha -= 0.025; // Fade out
        
        // Remove if faded out
        if (anim.alpha <= 0) {
          scoreAnims.splice(i, 1);
        }
      }
    }
    
    function gameOver() {
      gameRunning = false;
      clearInterval(gameInterval);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').style.display = 'block';
      document.getElementById('restartBtn').style.display = 'inline-block';
    }
    
    function restartGame() {
      // Clear interval before restarting
      clearInterval(gameInterval);
      
      snake = [{x: 10, y: 10}];
      food = {x: 5, y: 5};
      dx = 1; // Start moving right
      dy = 0;
      nextDx = 1;
      nextDy = 0;
      score = 0;
      gameSpeed = 150; // Reset speed
      gameRunning = true;
      gameStarted = true;
      isPaused = false;
      scoreAnims = [];
      
      document.getElementById('score').textContent = '0';
      document.getElementById('gameOver').style.display = 'none';
      document.getElementById('restartBtn').style.display = 'none';
      document.getElementById('startScreen').style.display = 'none';
      
      spawnFood();
      gameInterval = setInterval(update, gameSpeed);
    }
    
    // Initial draw (frozen snake on start screen)
    spawnFood();
    draw();
  </script>
</body>
</html>
